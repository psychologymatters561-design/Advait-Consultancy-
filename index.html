<style>
/* ================================================================
   RESET & VARIABLES
================================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ob:#04040a;
  --s1:#090910;
  --s2:#101018;
  --s3:#18181f;
  --g:#c9a84c;
  --gd:#8a6f32;
  --gx:rgba(201,168,76,0.12);
  --w:#f0ede6;
  --wd:rgba(240,237,230,0.45);
  --wdd:rgba(240,237,230,0.15);
  --bl:#3b82f6;
  --bld:#1d4ed8;
  --rd:#ef4444;
  --bor:rgba(201,168,76,0.14);
  --borw:rgba(240,237,230,0.07);
}
html{font-size:16px;scroll-behavior:smooth;}
body{
  background:var(--ob);
  color:var(--w);
  font-family:'DM Mono',monospace;
  font-weight:300;
  overflow-x:hidden;
  cursor:none;
}
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-track{background:var(--ob);}
::-webkit-scrollbar-thumb{background:var(--gd);}
a{text-decoration:none;color:inherit;}

/* ================================================================
   CURSOR
================================================================ */
#cdot,#cring{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;border-radius:50%;transform:translate(-50%,-50%);}
#cdot{width:5px;height:5px;background:var(--g);}
#cring{width:34px;height:34px;border:1px solid rgba(201,168,76,0.5);transition:width .2s,height .2s,background .2s,border-color .2s;}
#cring.h{width:56px;height:56px;border-color:var(--g);background:rgba(201,168,76,0.04);}

/* ================================================================
   PAGE LOADER
================================================================ */
#loader{
  position:fixed;inset:0;
  background:var(--ob);
  z-index:99999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:32px;
}
.ld-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:2rem;font-weight:300;
  letter-spacing:.6em;color:var(--g);text-transform:uppercase;
}
.ld-bar{
  width:200px;height:1px;
  background:var(--borw);
  position:relative;overflow:hidden;
}
.ld-fill{
  position:absolute;inset:0 100% 0 0;
  background:var(--g);
  animation:lfill 1.8s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes lfill{to{right:0;}}
.ld-text{
  font-size:.55rem;letter-spacing:.4em;color:var(--wd);text-transform:uppercase;
  animation:lfade 1.8s ease forwards;
}
@keyframes lfade{0%{opacity:0;}50%{opacity:1;}100%{opacity:0;}}

/* ================================================================
   NOISE GRAIN
================================================================ */
#noise{
  position:fixed;inset:0;z-index:9998;pointer-events:none;
  opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ================================================================
   NAVIGATION
================================================================ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  padding:26px 64px;
  display:flex;align-items:center;justify-content:space-between;
  transition:background .4s,backdrop-filter .4s;
}
nav.sc{background:rgba(4,4,10,.88);backdrop-filter:blur(24px);}
nav.sc::after{opacity:1;}
nav::after{
  content:'';position:absolute;bottom:0;left:64px;right:64px;
  height:1px;background:var(--bor);opacity:0;transition:opacity .4s;
}
.nl{
  font-family:'Cormorant Garamond',serif;
  font-size:1rem;font-weight:300;
  letter-spacing:.35em;color:var(--w);text-transform:uppercase;
}
.nl em{color:var(--g);font-style:normal;}
.nr{display:flex;gap:40px;list-style:none;}
.nr a{
  font-size:.58rem;letter-spacing:.22em;color:var(--wd);
  text-transform:uppercase;transition:color .3s;position:relative;
}
.nr a::after{
  content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;
  background:var(--g);transition:width .3s;
}
.nr a:hover{color:var(--g);}
.nr a:hover::after{width:100%;}

/* ================================================================
   SECTION BASICS
================================================================ */
.si{max-width:1240px;margin:0 auto;padding:140px 64px;}
.sl{
  font-size:.52rem;letter-spacing:.42em;color:var(--g);
  text-transform:uppercase;margin-bottom:28px;
  display:flex;align-items:center;gap:16px;
}
.sl::before{content:'';width:32px;height:1px;background:var(--g);}
.st{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.4rem,4.8vw,4.8rem);
  font-weight:300;line-height:1.08;color:var(--w);margin-bottom:28px;
}
.st em{font-style:italic;color:var(--g);}
.sb{font-size:.72rem;line-height:2;color:var(--wd);max-width:560px;}

/* ================================================================
   HERO
================================================================ */
#hero{position:relative;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#hcv{position:absolute;inset:0;z-index:0;}
.hcon{position:relative;z-index:1;text-align:center;max-width:940px;padding:0 48px;}
.hey{
  font-size:.54rem;letter-spacing:.45em;color:var(--g);
  text-transform:uppercase;margin-bottom:44px;opacity:0;transform:translateY(20px);
  display:flex;align-items:center;justify-content:center;gap:20px;
}
.hey::before,.hey::after{content:'';flex:1;max-width:80px;height:1px;background:var(--bor);}
.hh{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3.2rem,8.5vw,8rem);font-weight:300;line-height:1.02;
  color:var(--w);opacity:0;transform:translateY(32px);margin-bottom:36px;
}
.hh em{font-style:italic;color:var(--g);}
.hs{
  font-size:.72rem;line-height:1.9;color:var(--wd);
  max-width:580px;margin:0 auto 60px;opacity:0;transform:translateY(24px);
}
.hb{
  display:inline-flex;align-items:center;gap:14px;
  font-size:.6rem;letter-spacing:.3em;color:var(--g);
  text-transform:uppercase;border:1px solid var(--bor);
  padding:15px 36px;opacity:0;position:relative;overflow:hidden;
  transition:color .4s;
}
.hb::before{
  content:'';position:absolute;inset:0;background:var(--g);
  transform:scaleX(0);transform-origin:left;transition:transform .4s;z-index:-1;
}
.hb:hover{color:var(--ob);}
.hb:hover::before{transform:scaleX(1);}
.sci{
  position:absolute;bottom:44px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;
}
.sci span{font-size:.5rem;letter-spacing:.35em;color:var(--wd);text-transform:uppercase;}
.scl{
  width:1px;height:56px;
  background:linear-gradient(to bottom,var(--g),transparent);
  animation:scpulse 2s ease-in-out infinite;
}
@keyframes scpulse{0%,100%{opacity:.3;transform:scaleY(1);}50%{opacity:1;transform:scaleY(.7);}}

/* ================================================================
   MARQUEE
================================================================ */
.mqt{
  overflow:hidden;border-top:1px solid var(--borw);border-bottom:1px solid var(--borw);
  padding:18px 0;background:var(--s1);
}
.mqi{display:flex;gap:72px;animation:mq 35s linear infinite;white-space:nowrap;}
.mqm{
  font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:300;
  letter-spacing:.18em;color:var(--wd);text-transform:uppercase;
  display:flex;align-items:center;gap:16px;flex-shrink:0;
}
.mqm::after{content:'◆';font-size:.38rem;color:var(--g);}
@keyframes mq{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ================================================================
   MACRO THESIS
================================================================ */
#macro{background:var(--s1);}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;margin-top:80px;}
.cbox{
  background:rgba(255,255,255,.018);border:1px solid var(--bor);
  padding:32px;border-radius:2px;position:relative;overflow:hidden;
}
.cbox::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--g),transparent);opacity:.4;
}
.ctitle{font-size:.56rem;letter-spacing:.3em;color:var(--wd);text-transform:uppercase;margin-bottom:20px;}
#mccv{width:100%;display:block;}
.cleg{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap;}
.cli{display:flex;align-items:center;gap:8px;font-size:.52rem;letter-spacing:.18em;color:var(--wd);text-transform:uppercase;}
.cld{width:7px;height:7px;border-radius:50%;}
.mstats{display:flex;flex-direction:column;gap:36px;}
.msb{border-left:1px solid var(--bor);padding-left:28px;transition:border-color .3s;}
.msb:hover{border-color:var(--g);}
.msn{
  font-family:'Bebas Neue',sans-serif;font-size:3.8rem;line-height:1;
  color:var(--w);margin-bottom:10px;
}
.msn em{color:var(--g);font-style:normal;}
.msl{font-size:.58rem;letter-spacing:.15em;color:var(--wd);text-transform:uppercase;line-height:1.7;}
.iblock{margin-top:60px;padding-top:40px;border-top:1px solid var(--borw);}
.ilabel{font-size:.5rem;letter-spacing:.32em;color:var(--wd);text-transform:uppercase;margin-bottom:22px;}
.irow{display:flex;gap:40px;flex-wrap:wrap;align-items:center;}
.iname{
  font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:300;
  letter-spacing:.14em;color:rgba(240,237,230,.18);text-transform:uppercase;
  transition:color .4s;
}
.iname:hover{color:rgba(240,237,230,.55);}

/* ================================================================
   ASSET INTELLIGENCE
================================================================ */
#assets{background:var(--ob);}
.alay{display:grid;grid-template-columns:420px 1fr;gap:64px;align-items:center;margin-top:80px;}
.amap{
  position:relative;
  background:rgba(255,255,255,.012);border:1px solid var(--bor);
  border-radius:2px;overflow:hidden;
}
#imap{width:100%;display:block;}
.acards{display:flex;flex-direction:column;gap:20px;}
.acard{
  border:1px solid var(--borw);padding:26px 28px;
  position:relative;overflow:hidden;
  transition:border-color .35s,background .35s;cursor:default;
}
.acard::before{
  content:'';position:absolute;top:0;left:0;width:3px;height:0;
  background:var(--g);transition:height .4s;
}
.acard:hover{background:rgba(255,255,255,.025);border-color:var(--bor);}
.acard:hover::before{height:100%;}
.actype{font-size:.48rem;letter-spacing:.38em;text-transform:uppercase;margin-bottom:10px;}
.actitle{font-family:'Cormorant Garamond',serif;font-size:1.28rem;font-weight:300;margin-bottom:6px;}
.acmetric{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;line-height:1;margin-bottom:8px;}
.acdesc{font-size:.58rem;line-height:1.85;color:var(--wd);}

/* ================================================================
   LEVERAGE ARCHITECTURE
================================================================ */
#leverage{background:var(--s1);}
.llay{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;margin-top:80px;}
.lsteps{display:flex;flex-direction:column;}
.lstep{padding:26px 0;border-bottom:1px solid var(--borw);display:flex;gap:20px;}
.lstep:first-child{border-top:1px solid var(--borw);}
.lnum{
  font-family:'Bebas Neue',sans-serif;font-size:2.2rem;line-height:1;
  color:var(--g);opacity:.3;min-width:44px;transition:opacity .3s;
}
.lstep:hover .lnum{opacity:.8;}
.ltit{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:300;margin-bottom:8px;}
.ldsc{font-size:.58rem;line-height:1.85;color:var(--wd);}
.cylwrap{display:flex;flex-direction:column;align-items:center;gap:24px;padding:32px;}
#cylsvg{width:180px;}
.cylcap{font-size:.5rem;letter-spacing:.25em;color:var(--wd);text-transform:uppercase;text-align:center;}

/* ================================================================
   COLLECTIVE
================================================================ */
#collective{background:var(--ob);}
.cmani{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.6rem,3.2vw,2.8rem);font-weight:300;line-height:1.55;
  max-width:820px;margin:60px 0;
}
.cmani em{font-style:italic;color:var(--g);}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--borw);margin-top:64px;}
.pcell{background:var(--ob);padding:44px 32px;transition:background .3s;}
.pcell:hover{background:rgba(255,255,255,.018);}
.pnum{
  font-family:'Bebas Neue',sans-serif;font-size:3.2rem;color:var(--g);
  opacity:.25;margin-bottom:20px;transition:opacity .3s;
}
.pcell:hover .pnum{opacity:.6;}
.ptit{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300;margin-bottom:14px;}
.pdsc{font-size:.58rem;line-height:1.9;color:var(--wd);}

/* ================================================================
   INTELLIGENCE HUB
================================================================ */
#intel{background:var(--s1);}
.hctrl{
  display:flex;gap:28px;margin-top:56px;margin-bottom:44px;
  border-bottom:1px solid var(--borw);padding-bottom:20px;
}
.hflt{
  font-size:.56rem;letter-spacing:.22em;text-transform:uppercase;
  color:var(--wd);background:none;border:none;cursor:pointer;
  padding:6px 0;position:relative;transition:color .3s;
}
.hflt::after{
  content:'';position:absolute;bottom:-21px;left:0;width:0;height:1px;
  background:var(--g);transition:width .3s;
}
.hflt.act{color:var(--g);}
.hflt.act::after{width:100%;}
.hgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--borw);}
.hcard{
  background:var(--s1);padding:36px 28px;
  position:relative;overflow:hidden;transition:background .3s;
  display:block;color:var(--w);
}
.hcard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--g);transform:scaleX(0);transform-origin:left;transition:transform .4s;
}
.hcard:hover{background:var(--s2);}
.hcard:hover::before{transform:scaleX(1);}
.hcmeta{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.hctype{font-size:.46rem;letter-spacing:.36em;text-transform:uppercase;}
.hcdate{font-size:.46rem;color:var(--wd);letter-spacing:.18em;}
.hctitle{font-family:'Cormorant Garamond',serif;font-size:1.18rem;font-weight:300;line-height:1.38;margin-bottom:12px;}
.hcexc{font-size:.58rem;line-height:1.8;color:var(--wd);margin-bottom:20px;}
.hclink{font-size:.5rem;letter-spacing:.28em;text-transform:uppercase;color:var(--g);display:flex;align-items:center;gap:10px;}
.hcard:hover .hcarr{transform:translateX(6px);}
.hcarr{transition:transform .3s;display:inline-block;}

/* ================================================================
   TERMINAL / CHATBOT
================================================================ */
#terminal{background:var(--ob);min-height:100vh;display:flex;align-items:center;}
.tlay{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;}
.tintro{}
.tbox{
  background:rgba(9,9,16,.95);border:1px solid rgba(201,168,76,.25);
  border-radius:4px;overflow:hidden;
  box-shadow:0 0 100px rgba(201,168,76,.04),0 40px 80px rgba(0,0,0,.4);
}
.tbar{
  background:rgba(201,168,76,.06);border-bottom:1px solid rgba(201,168,76,.12);
  padding:12px 20px;display:flex;align-items:center;gap:8px;
}
.tdot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.08);}
.tdot:nth-child(1){background:rgba(239,68,68,.55);}
.tdot:nth-child(2){background:rgba(245,158,11,.55);}
.tdot:nth-child(3){background:rgba(16,185,129,.55);}
.tbtitle{margin:0 auto;font-size:.5rem;letter-spacing:.3em;color:var(--wd);text-transform:uppercase;}
.tbody{padding:28px;min-height:500px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;max-height:500px;}
.tline{font-size:.68rem;line-height:1.65;display:flex;gap:10px;align-items:flex-start;}
.tpr{color:var(--g);white-space:nowrap;user-select:none;margin-top:1px;}
.ttx{color:var(--w);}
.ttx.dim{color:var(--wd);}
.ttx.gld{color:var(--g);}
.topts{display:flex;flex-direction:column;gap:7px;padding-left:0;width:100%;}
.topt{
  font-family:'DM Mono',monospace;font-size:.62rem;color:var(--wd);
  background:none;border:1px solid var(--borw);padding:10px 14px;
  text-align:left;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:10px;width:100%;
}
.topt::before{content:attr(data-k);color:var(--g);font-size:.5rem;min-width:14px;}
.topt:hover{border-color:var(--g);color:var(--w);background:rgba(201,168,76,.04);}
.topt.sel{border-color:var(--g);color:var(--g);background:rgba(201,168,76,.07);}
.topt:disabled{pointer-events:none;}
.tcur{display:inline-block;width:7px;height:13px;background:var(--g);animation:blink 1.1s step-end infinite;vertical-align:text-bottom;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.tfrm{border:1px solid rgba(201,168,76,.15);padding:20px;background:rgba(201,168,76,.015);border-radius:2px;width:100%;}
.tflabel{font-size:.5rem;letter-spacing:.3em;color:var(--g);text-transform:uppercase;margin-bottom:14px;}
.tfrow{display:flex;gap:10px;align-items:center;margin-bottom:10px;border-bottom:1px solid var(--borw);padding-bottom:10px;}
.tinp{flex:1;background:none;border:none;outline:none;font-family:'DM Mono',monospace;font-size:.66rem;color:var(--w);caret-color:var(--g);}
.tsub{
  font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--g);background:none;
  border:1px solid var(--bor);padding:9px 18px;cursor:pointer;
  transition:all .3s;margin-top:12px;width:100%;
}
.tsub:hover{background:var(--g);color:var(--ob);}
.taccess{
  border-left:1px solid var(--bor);padding-left:22px;margin-top:40px;
}
.taclab{font-size:.5rem;letter-spacing:.3em;color:var(--g);text-transform:uppercase;margin-bottom:12px;}
.tacitem{font-size:.62rem;line-height:1.8;color:var(--wd);margin-bottom:4px;}

/* ================================================================
   FOOTER
================================================================ */
footer{background:var(--s1);border-top:1px solid var(--borw);padding:80px 64px 56px;}
.fi{max-width:1240px;margin:0 auto;}
.ftop{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:60px;margin-bottom:72px;}
.flogo{
  font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;
  letter-spacing:.22em;text-transform:uppercase;margin-bottom:14px;
}
.flogo em{col
